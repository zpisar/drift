<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#f7f4ed">
  <title>Drift</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="shell">
    <div class="layout">
      <section class="game-column" aria-label="Game area">
        <section class="hud" aria-label="Game status">
          <div>
            <div class="label">Score</div>
            <div id="score" class="value">0.0</div>
          </div>
          <div class="hud-right">
            <div class="label">Best</div>
            <div id="best" class="value">0.0</div>
          </div>
        </section>

        <section class="game-frame" aria-label="Drift game">
          <div class="lane lane-top" aria-hidden="true"></div>
          <div class="lane lane-bottom" aria-hidden="true"></div>
          <div id="player" class="player" aria-hidden="true"></div>
          <div id="obstacles" class="obstacles" aria-hidden="true"></div>

          <div id="overlay-start" class="overlay is-visible">
            <h1>Drift</h1>
            <p>One button. Two lanes. Survive as long as you can.</p>
            <button id="start-button" class="button" type="button">Start</button>
            <div id="countdown" class="countdown" aria-live="polite"></div>
            <div class="hint">Press Space on desktop, or tap the playfield on touch devices.</div>
          </div>

          <div id="overlay-over" class="overlay">
            <h2>Game Over</h2>
            <p>Your run ended at <span id="final-score">0.0</span>.</p>
            <label class="name-field" for="player-name">
              <span>Name</span>
              <input id="player-name" type="text" maxlength="16" placeholder="Your name">
            </label>
            <button id="save-score-button" class="button" type="button">Save Score</button>
            <button id="restart-button" class="button button-secondary" type="button">Restart</button>
          </div>
        </section>
      </section>

      <aside class="scoreboard" aria-label="Top scores">
        <div class="scoreboard-head">
          <div class="label">Top 5</div>
          <div class="scoreboard-sub">Best runs</div>
        </div>
        <div id="scoreboard-status" class="scoreboard-status"></div>
        <ol id="scoreboard-list" class="scoreboard-list"></ol>
      </aside>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="script.js"></script>
</body>
</html>
